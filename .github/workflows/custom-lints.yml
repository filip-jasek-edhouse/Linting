name: custom-lints

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dylint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-16
          components: rustc-dev, llvm-tools-preview

      - name: Install Dylint tools
        run: cargo install cargo-dylint dylint-link --locked

      - name: Run custom lint and fail on findings
        shell: bash
        run: |
          set -euo pipefail

          lint_paths=(
            test_lint
            recursion_lint
            inf_loop_lint
            non_stack_lint
          )

          for lint_path in "${lint_paths[@]}"; do
            lint_name="$lint_path"
            if [[ "$lint_path" == "test_lint" ]]; then
              lint_name="test_linting"
            fi

            echo "Running ${lint_name} from ${lint_path}"
            DYLINT_RUSTFLAGS="-D ${lint_name}" cargo dylint --path "$lint_path" --workspace -- --all-targets
          done
