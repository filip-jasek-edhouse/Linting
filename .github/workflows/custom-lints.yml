name: custom-lints

on:
  pull_request:
  push:
    branches: [main]

jobs:
  dylint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-16
          components: rustc-dev, llvm-tools-preview

      - name: Install Dylint tools
        run: cargo install cargo-dylint dylint-link --locked

      - name: Run custom lint and fail on findings
        shell: bash
        run: |
          set -euo pipefail

          lints=(test_linting)
          while IFS= read -r lint_dir; do
            lints+=("$lint_dir")
          done < <(find . -maxdepth 1 -mindepth 1 -type d -name "*_lint" -printf "%f\n" | sort)

          for lint in "${lints[@]}"; do
            echo "Running $lint"
            DYLINT_RUSTFLAGS="-D $lint" cargo dylint --path "$lint" --workspace -- --all-targets
          done
